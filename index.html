<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Danrode Command System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-glow-container">
        
        <!-- 1. قسم الواجهة الرئيسية Main UI -->
