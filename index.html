<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Danrode Command System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-container">

        <!-- 1. قسم الواجهة الرئيسية Main UI -->

            <img src="mui.png" alt="Main UI" class="ui-image">
            
            <!-- زرار Download: بيودي لقسم التحميل تحت -->
            <a href="#download-section" class="hotspot" style="top: 70%; left: 10%; width: 25%; height: 15%;"></a>

            <a href="#info-section" class="hotspot" style="top: 70%; left: 60%; width: 25%; height: 15%;"></a>

            <!-- زرار الـ Python: بيحمل ملف 0.0.7.py -->
            <a href="0.0.7.py" download class="hotspot" style="top: 72%; left: 70%; width: 25%; height: 15%;"></a>
